# Nginx configuration for School Payment System API
# Save this as: /etc/nginx/sites-available/payment-api

upstream payment_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.scolapp.com payment.scolapp.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.scolapp.com payment.scolapp.com;
    
    # SSL Configuration (update paths to your actual SSL certificates)
    ssl_certificate /etc/letsencrypt/live/scolapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scolapp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Logging
    access_log /var/log/nginx/payment-api-access.log;
    error_log /var/log/nginx/payment-api-error.log;
    
    # Client body size (for file uploads if needed)
    client_max_body_size 10M;
    
    # Root location
    location / {
        proxy_pass http://payment_api;
        proxy_http_version 1.1;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://payment_api;
        access_log off;
    }
    
    # API documentation (optional - can be restricted)
    location /api/v1/docs {
        proxy_pass http://payment_api;
        
        # Optional: Restrict access to docs in production
        # allow 192.168.1.0/24;  # Your office IP
        # deny all;
    }
    
    # Static files (if any)
    location /static {
        alias /var/www/school-payment-system/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
